# yaw_rate_cmd generators
# - sine: ramped sine
# - circle: constant yaw rate with smooth ramp
# - step: step yaw rate (optional ramp)
# - chirp: sine with time-varying frequency
# - square: square wave (with smoothed edges)

yaw_profile:
  type: sine           # ?ъ슜???붾젅?댄듃 ?꾨줈?뚯씪: sine/circle/step/chirp/square | 異붿쿇: chirp
  sine:
    amp: 0.5             # 吏꾪룺 [rad/s] | 異붿쿇: 0.30
    freq_hz: 0.1       # 二쇳뙆??[Hz] | 異붿쿇: 0.50
    start_delay: 1.0      # ?쒖옉 吏??[s] | 異붿쿇: 1.0
    ramp_time: 30.0        # ?⑦봽???쒓컙 [s] | 異붿쿇: 1.0
  circle:
    yaw_rate: 0.20        # ?쇱젙 ?붾젅?댄듃 [rad/s] | 異붿쿇: 0.20
    start_delay: 1.0      # ?쒖옉 吏??[s] | 異붿쿇: 1.0
    ramp_time: 50.0        # ?⑦봽???쒓컙 [s] | 異붿쿇: 1.0
  step:
    value: 0.5           # ?ㅽ뀦 ?ш린 [rad/s] | 異붿쿇: 0.25
    start_time: 1.0       # ?ㅽ뀦 ?쒖옉 ?쒓컙 [s] | 異붿쿇: 1.0
    ramp_time: 0.5        # ?ㅽ뀦 ?⑦봽 ?쒓컙 [s] | 異붿쿇: 0.5
  square:
    amp: 0.001             # 吏꾪룺 [rad/s] | 異붿쿇: 0.25
    freq_hz: 0.10         # ?ㅼ쐞移?二쇳뙆??[Hz] | 異붿쿇: 0.50
    start_delay: 1.0      # ?쒖옉 吏??[s] | 異붿쿇: 1.0
    ramp_time: 5.0        # ?쒖옉 ?⑦봽???쒓컙 [s] | 異붿쿇: 1.0
    transition_time: 0.10 # 媛??꾪솚(짹amp) 援ш컙??遺?쒕윭???꾩씠 ?쒓컙 [s] | 異붿쿇: 0.10
    start_sign: 1         # ?쒖옉 遺??+1/-1) | 異붿쿇: 1
  chirp:
    amp: 0.01             # 吏꾪룺 [rad/s] | 異붿쿇: 0.25
    f0_hz: 0.01           # ?쒖옉 二쇳뙆??[Hz] | 異붿쿇: 0.20
    f1_hz: 0.05           # 醫낅즺 二쇳뙆??[Hz] | 異붿쿇: 1.50
    t1: 8.0               # 二쇳뙆???ㅼ쐲 ?쒓컙 [s] | 異붿쿇: 8.0
    start_delay: 1.0      # ?쒖옉 吏??[s] | 異붿쿇: 1.0
    ramp_time: 2.0        # ?⑦봽???쒓컙 [s] | 異붿쿇: 1.0

