# Yaw-rate study configuration

sim:
  dt: 0.001              # ?쒕??덉씠???쒓컙 媛꾧꺽 [s] | 異붿쿇: 0.001 (J ?앸퀎? 0.0005)
  time: 30.0             # 珥??쒕??덉씠???쒓컙 [s] | 異붿쿇: 10.0
  speed_mps: 10.0        # 紐⑺몴 ?띾룄 [m/s] | 異붿쿇: 10.0
  seed: 1                # ?쒕뜡 ?쒕뱶 | 異붿쿇: 1
  speed_mode: pid       # ?띾룄 ?좎? 諛⑹떇: lock(媛뺤젣 怨좎젙) or pid(?띾룄 ?쒖뼱湲? | 異붿쿇: lock
  vehicle_config_path: null  # 李⑤웾 ?뚮씪誘명꽣 YAML 寃쎈줈 (null?대㈃ 湲곕낯 vehicle_standard.yaml) | 異붿쿇: null

control:
  mode: ff_fb_ls            # ?쒖뼱湲?紐⑤뱶: ff, ff_fb, ff_ls, ff_fb_ls | 異붿쿇: ff_ls
  feedback:
    yaw_rate: true         # ?붾젅?댄듃 ?쇰뱶諛??ъ슜 ?щ? | 異붿쿇: false
    fy: true              # ???〓젰(Fy) ?쇰뱶諛??ъ슜 ?щ? | 異붿쿇: false
    fy_source: estimate        # Fy ?쇰뱶諛??뚯뒪: true(?쒕??덉씠?? / estimate(ay 異붿젙移? | 異붿쿇: true
    steering: true         # 議고뼢媛??쇰뱶諛??ъ슜 ?щ? | 異붿쿇: false
  feedforward:
    use_align_torque: true # FF???쇰씪?대떇 ?좏겕 蹂댁긽 ?ъ슜 ?щ? | 異붿쿇: true
    max_accel: null        # 議고뼢 媛?띾룄 ?쒗븳 [rad/s^2] (null?대㈃ ?쒗븳 ?놁쓬) | 異붿쿇: null
    torque_limit: null     # 議고뼢 ?좏겕 ?쒗븳 [N*m] (null?대㈃ ?쒗븳 ?놁쓬) | 異붿쿇: null
    param_bias_enabled: false  # true硫?FF?먯꽌 ?곕뒗 B/C慣瑜?(1+param_bias_percent)濡??쒖옉(紐⑤뜽 mismatch 媛??
    param_bias_percent: 0.10   # ?곷? 諛붿씠?댁뒪 (0.10 = +10%)

randomization:
  enabled: true            # ?뚮씪誘명꽣 ?쒕뜡???ъ슜 ?щ? | 異붿쿇: true
  mode: gaussian             # ?쒕뜡??諛⑹떇: static(1?? or gaussian(?곗냽 ?쒕━?꾪듃) | 異붿쿇: gaussian
  percent: 0.10            # B_cq, C_alpha 蹂??踰붿쐞 (?? 0.10 = 짹10%) | 異붿쿇: 0.10
  per_wheel: false         # 諛뷀대퀎濡??낅┰ ?쒕뜡?뷀븷吏 ?щ? | 異붿쿇: false
  randomize_b: true       # B_cq ?쒕뜡???ъ슜 ?щ? | 異붿쿇: true
  randomize_c: true        # C_alpha ?쒕뜡???ъ슜 ?щ? | 異붿쿇: true
  gaussian:
    sigma_percent: 0.05   # 1? 蹂?붿쑉(?곷?媛?/sqrt(s) (?? 0.002 = 0.2%/sqrt(s)) | 異붿쿇: 0.005
    update_every: 100        # ?낅뜲?댄듃 ?ㅽ뀦 媛꾧꺽 (1=留??ㅽ뀦) | 異붿쿇: 1
    randomize_initial: false   # true硫?珥덇린 ?쒕뜡??ON, false硫?nominal?먯꽌 ?쒕━?꾪듃 ?쒖옉 | 異붿쿇: true

estimator:
  enabled: true            # 理쒖냼?먯듅/異붿젙湲??ъ슜 ?щ? | 異붿쿇: true
  type: rls                # 異붿젙 諛⑹떇 (?꾩옱 rls留??ъ슜) | 異붿쿇: rls
  c_alpha_source: estimate     # C_alpha 異붿젙 ?낅젰: true(?ㅼ젣媛? / estimate(異붿젙移? | 異붿쿇: true
  b_align_source: estimate     # B_cq 異붿젙??align torque: true(紐⑤뜽) / estimate(異붿젙) / ignore(0) | 異붿쿇: true
  # 怨듯넻(湲곕낯) RLS ?뚮씪誘명꽣: estimator.b / estimator.c_alpha媛 ?놁쑝硫???媛믪쓣 ?ъ슜
  lambda: 0.999
  p0: 3.5
  min_samples: 4000
  start_time: 3.0           # 怨듯넻 start time (媛쒕퀎 ?ㅼ젙: estimator.b.start_time / estimator.c_alpha.start_time)

  # 遺꾨━ ?쒕떇(?좏깮): B??/ C慣?⑹쑝濡?貫, p0, min_samples, sample_decimation???곕줈 以????덉쓬
  # (?ш린 媛믪쓣 梨꾩슦硫??꾩쓽 怨듯넻 媛믩낫???곗꽑 ?곸슜)
  b:
    start_time: 0.1
    lambda: 0.9995
    p0: 5.0
    min_samples: 4000
    sample_decimation: 1   # B ?꾩슜
    
  c_alpha:
    start_time: 1.0
    lambda: 0.99
    p0: 50.0
    min_samples: 10000
    sample_decimation: 5   # C慣 ?꾩슜

  dot_min_abs: 0.00001
  alpha_min_abs: 0.0001
  fz_min: 100.0
  fy_saturation_margin: 0.05
  angle_margin_rad: 0.02
  rate_margin_rad_s: 0.2
  clamp:
    b_min: 1.0             # B_cq ?섑븳 | 異붿쿇: 1.0
    b_max: 200.0           # B_cq ?곹븳 | 異붿쿇: 200.0
    c_alpha_min: 20000.0   # C_alpha ?섑븳 [N/rad] | 異붿쿇: 20000.0
    c_alpha_max: 200000.0  # C_alpha ?곹븳 [N/rad] | 異붿쿇: 200000.0









lateral_force_estimator:
  enabled: true            # ay 湲곕컲 Fy_total 異붿젙/?됯? ?ъ슜 ?щ? | 異붿쿇: true
  ay_source: imu           # ay ?낅젰 ?뚯뒪: imu(?뱀젙?? / kinematic(?띾룄+?붾젅?댄듃) | 異붿쿇: imu
